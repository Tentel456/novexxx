<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../reset.css">
    <link rel="stylesheet" href="auth.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <title>NOVEX - Create Account</title>
</head>

<body>
    <div class="auth-container">
        <!-- Left Panel -->
        <div class="auth-left-panel"></div>

        <!-- Right Panel -->
        <div class="auth-right-panel">
            <div class="auth-form-container">
                <div class="auth-header">
                    <div class="auth-brand-logo">
                        <img src="../assets/logo/novex_logo.png" alt="NOVEX" class="auth-logo-img">
                    </div>
                </div>

                <!-- Registration Form -->
                <form class="auth-form" id="registrationForm">
                    <div class="auth-form-header">
                        <h2 class="auth-form-title">Create Account</h2>
                        <a href="#" class="auth-switch-link" id="switchToLogin">Log in</a>
                    </div>

                    <div class="auth-form-group">
                        <label class="auth-label">Email/Mobile Number*</label>
                        <input 
                            type="text" 
                            class="auth-input" 
                            placeholder="Email/Mobile (Without country code)"
                            id="emailInput"
                            required
                        >
                        <span class="auth-error-message" id="emailError"></span>
                    </div>

                    <div class="auth-form-group">
                        <label class="auth-label">Referral Code (Optional)</label>
                        <input 
                            type="text" 
                            class="auth-input" 
                            id="referralInput"
                        >
                    </div>

                    <button type="submit" class="auth-submit-btn" id="registerBtn">Create Account</button>

                    <div class="auth-divider">
                        <span>OR SIGN UP WITH</span>
                    </div>

                    <div class="auth-social-buttons">
                        <button type="button" class="auth-social-btn" id="googleSignUp">
                            <img src="images/google-icon.svg" alt="Google">
                        </button>
                    </div>
                </form>

                <!-- Login Form -->
                <form class="auth-form" id="loginForm" style="display: none;">
                    <div class="auth-form-header">
                        <h2 class="auth-form-title">Log In</h2>
                        <a href="#" class="auth-switch-link" id="switchToRegister">Create Account</a>
                    </div>

                    <div class="auth-form-group">
                        <label class="auth-label">Email/Mobile Number*</label>
                        <input 
                            type="text" 
                            class="auth-input" 
                            placeholder="Email/Mobile (Without country code)"
                            id="loginEmailInput"
                            required
                        >
                        <span class="auth-error-message" id="loginEmailError"></span>
                    </div>

                    <div class="auth-form-group">
                        <label class="auth-label">Password*</label>
                        <input 
                            type="password" 
                            class="auth-input" 
                            placeholder="Enter your password"
                            id="passwordInput"
                            required
                        >
                        <span class="auth-error-message" id="passwordError"></span>
                    </div>

                    <button type="submit" class="auth-submit-btn" id="loginBtn">Log In</button>

                    <div class="auth-divider">
                        <span>OR LOG IN WITH</span>
                    </div>

                    <div class="auth-social-buttons">
                        <button type="button" class="auth-social-btn" id="googleSignIn">
                            <img src="images/google-icon.svg" alt="Google">
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>

</html>
